<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>repograph</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
<style>
  :root {
    --bg: #0C0C0A; --pane: #100F0C; --sel: #26231A;
    --border: #38352B; --amber: #FFB000; --amber-dim: #96690A;
    --text: #D6D2C4; --dim: #837E70; --faint: #4E4A3F;
    --green: #A9B665; --teal: #7DAEA3; --orange: #E78A4E;
    --red: #EA6962; --yellow: #D8A657; --gray: #928374;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg); color: var(--text);
    font: 13px/1.5 "JetBrains Mono", ui-monospace, monospace;
    display: flex; flex-direction: column; overflow: hidden;
  }
  button { font: inherit; color: inherit; background: none; border: none;
    cursor: pointer; text-align: left; }
  :focus-visible { outline: 1px solid var(--amber); outline-offset: -1px; }
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--border); }
  ::-webkit-scrollbar-track { background: transparent; }

  /* ── header ─────────────────────────────────────────────────────────── */
  header {
    display: flex; align-items: center; gap: 2ch; padding: 6px 12px;
    border-bottom: 1px solid var(--border); white-space: nowrap; overflow: hidden;
  }
  header .logo { color: var(--amber); font-weight: 700; }
  header .path { color: var(--dim); overflow: hidden; text-overflow: ellipsis; }
  header .stats { margin-left: auto; color: var(--dim); }
  header .stats b { color: var(--text); font-weight: 400; }
  #search {
    background: var(--pane); border: 1px solid var(--border); color: var(--text);
    font: inherit; padding: 2px 8px; width: 26ch;
  }
  #search:focus { border-color: var(--amber); outline: none; }
  #search::placeholder { color: var(--faint); }

  /* ── pane grid ──────────────────────────────────────────────────────── */
  main {
    flex: 1; display: grid; min-height: 0; gap: 10px; padding: 10px;
    grid-template-columns: 30ch minmax(0, 1fr) 52ch;
    grid-template-rows: minmax(0, 1fr) 16ch;
    grid-template-areas: "modules nodes inspector" "issues issues inspector";
  }
  .pane {
    position: relative; border: 1px solid var(--border); background: var(--pane);
    display: flex; flex-direction: column; min-height: 0; min-width: 0;
    padding-top: 10px;
  }
  .pane.focused { border-color: var(--amber); }
  .pane-title {
    position: absolute; top: -9px; left: 10px; background: var(--bg);
    padding: 0 1ch; color: var(--dim); font-size: 12px; user-select: none;
  }
  .pane.focused .pane-title { color: var(--amber); }
  .pane-title b { color: inherit; font-weight: 700; }
  .pane-hint { position: absolute; top: -9px; right: 10px; background: var(--bg);
    padding: 0 1ch; color: var(--faint); font-size: 11px; }
  #p-modules { grid-area: modules; } #p-nodes { grid-area: nodes; }
  #p-inspector { grid-area: inspector; } #p-issues { grid-area: issues; }

  .scroll { overflow-y: auto; flex: 1; padding: 4px 0 8px; }

  /* ── list rows ──────────────────────────────────────────────────────── */
  .row {
    display: flex; align-items: baseline; gap: 1ch; width: 100%;
    padding: 1px 10px 1px 2ch; white-space: nowrap; position: relative;
  }
  .row:hover { background: var(--sel); }
  .row.selected { background: var(--sel); }
  .row.selected::before { content: "▶"; position: absolute; left: 6px; color: var(--amber); }
  .row .grow { flex: 1; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
  .row .num { color: var(--faint); }
  .k-module { color: var(--gray); } .k-function { color: var(--green); }
  .k-class { color: var(--teal); } .k-api { color: var(--orange); }
  .k-llm_call { color: var(--red); }
  .colhead { display: flex; gap: 1ch; padding: 0 10px 2px 2ch; color: var(--faint);
    border-bottom: 1px solid var(--border); font-size: 12px; user-select: none; }
  .colhead .grow { flex: 1; }
  .colhead u { text-decoration: none; color: var(--dim); }

  .meter { color: var(--faint); letter-spacing: -1px; }
  .meter b { font-weight: 400; }
  .m-lo b { color: var(--green); } .m-mid b { color: var(--yellow); } .m-hi b { color: var(--red); }

  /* ── inspector ──────────────────────────────────────────────────────── */
  #inspector-body { padding: 6px 14px 14px; overflow-y: auto; }
  .sect { color: var(--faint); margin: 12px 0 4px; user-select: none; }
  .sect::after { content: " ────────────────────────────────"; letter-spacing: -1px; }
  h2 { font-size: 14px; font-weight: 700; word-break: break-all; }
  .kv { display: grid; grid-template-columns: 14ch 1fr; row-gap: 1px; }
  .kv .k { color: var(--dim); }
  .file { color: var(--dim); word-break: break-all; }
  .deps button { display: block; width: 100%; padding: 0 0 0 0; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; }
  .deps button:hover { background: var(--sel); }
  .deps .arrow { color: var(--faint); }
  pre.code {
    border: 1px solid var(--border); background: var(--bg); color: var(--text);
    padding: 8px 10px; overflow-x: auto; font-size: 12px; max-height: 34ch; margin-top: 4px;
  }
  .issue-block { border-left: 2px solid var(--yellow); padding: 2px 0 2px 10px; margin: 6px 0; }
  .issue-block.high { border-left-color: var(--red); }
  .issue-block.low { border-left-color: var(--teal); }
  .issue-block .sev { color: var(--dim); }
  .issue-block.high .sev { color: var(--red); }
  .issue-block p { color: var(--dim); white-space: normal; }
  .empty { color: var(--faint); padding: 4px 14px; }

  /* ── issues log ─────────────────────────────────────────────────────── */
  #issues-list .sev { width: 6ch; flex-shrink: 0; }
  #issues-list .sev.high { color: var(--red); } #issues-list .sev.medium { color: var(--yellow); }
  #issues-list .sev.low { color: var(--teal); }
  #issues-list .loc { color: var(--faint); }

  /* ── graph overlay ──────────────────────────────────────────────────── */
  #p-map {
    position: absolute; inset: 10px 10px 10px 10px; z-index: 30; display: none;
    border-color: var(--amber);
  }
  #p-map.open { display: flex; }
  #cy { flex: 1; }
  #map-legend { position: absolute; bottom: 8px; left: 12px; color: var(--dim);
    font-size: 12px; background: var(--pane); padding: 0 1ch; }

  /* ── status bar ─────────────────────────────────────────────────────── */
  footer {
    display: flex; gap: 2ch; padding: 4px 12px; border-top: 1px solid var(--border);
    color: var(--dim); white-space: nowrap; overflow: hidden; user-select: none;
  }
  footer kbd {
    background: var(--border); color: var(--text); padding: 0 0.7ch;
    font: inherit; margin-right: 0.5ch;
  }
  footer .msg { margin-left: auto; color: var(--faint); overflow: hidden;
    text-overflow: ellipsis; }
  .cursor { display: inline-block; width: 1ch; background: var(--amber); color: var(--bg); }
  @media (prefers-reduced-motion: no-preference) {
    .cursor { animation: blink 1.1s steps(1) infinite; }
    @keyframes blink { 50% { background: transparent; color: var(--amber); } }
  }

  @media (max-width: 980px) {
    main { grid-template-columns: 1fr; grid-template-rows: auto auto auto auto;
      grid-template-areas: "modules" "nodes" "inspector" "issues"; overflow-y: auto; }
    .pane { min-height: 30vh; }
    footer { display: none; }
  }
</style>
</head>
<body>
<header>
  <span class="logo">repograph<span class="cursor">▌</span></span>
  <span class="path" id="repo-path"></span>
  <span class="stats" id="stats"></span>
  <input id="search" type="search" placeholder="/ find node" aria-label="Find node">
</header>

<main>
  <section class="pane" id="p-modules" aria-label="Modules">
    <span class="pane-title"><b>[1]</b> MODULES</span>
    <div class="scroll" id="modules-list" role="listbox"></div>
  </section>

  <section class="pane" id="p-nodes" aria-label="Nodes">
    <span class="pane-title"><b>[2]</b> NODES</span>
    <span class="pane-hint">sort: [r]isk [b]last [n]ame</span>
    <div class="colhead">
      <span style="width:11ch">KIND</span><span class="grow">NAME</span>
      <span style="width:16ch">RISK</span><span style="width:7ch">BLAST</span>
      <span style="width:6ch">ISSUES</span>
    </div>
    <div class="scroll" id="nodes-list" role="listbox"></div>
  </section>

  <section class="pane" id="p-inspector" aria-label="Inspector">
    <span class="pane-title"><b>[3]</b> INSPECTOR</span>
    <div id="inspector-body"></div>
  </section>

  <section class="pane" id="p-issues" aria-label="Issues log">
    <span class="pane-title"><b>[4]</b> ISSUES</span>
    <div class="scroll" id="issues-list" role="listbox"></div>
  </section>

  <section class="pane" id="p-map" aria-label="Graph map">
    <span class="pane-title"><b>[g]</b> MAP</span>
    <span class="pane-hint">[esc] close · click node to inspect</span>
    <div id="cy"></div>
    <span id="map-legend"></span>
  </section>
</main>

<footer>
  <span><kbd>j/k</kbd>move</span>
  <span><kbd>enter</kbd>open</span>
  <span><kbd>1-4</kbd>pane</span>
  <span><kbd>g</kbd>map</span>
  <span><kbd>/</kbd>search</span>
  <span><kbd>r b n</kbd>sort</span>
  <span><kbd>esc</kbd>back</span>
  <span class="msg" id="status-msg"></span>
</footer>

<script>
"use strict";
const $ = id => document.getElementById(id);
const esc = s => String(s ?? "").replace(/[&<>"']/g, c =>
  ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
const KCOLOR = { module:"#928374", function:"#A9B665", class:"#7DAEA3",
                 api:"#E78A4E", llm_call:"#EA6962" };
const KSHORT = { module:"mod", function:"fn", class:"class", api:"api", llm_call:"llm" };

const S = {                       // application state
  nodes: [], edges: [], summary: {}, issues: [],
  byId: {}, children: {}, parent: {}, issuesByNode: {},
  modules: [], modIdx: 0, nodeRows: [], nodeIdx: 0, issueIdx: 0,
  pane: 1, sort: "risk", query: "", mapOpen: false, cy: null,
};

function meter(value, max, cells, cls) {
  const filled = max > 0 ? Math.round(cells * Math.min(value, max) / max) : 0;
  return `<span class="meter ${cls}"><b>${"█".repeat(filled)}</b>${"░".repeat(cells - filled)}</span>`;
}
const riskCls = r => r >= 30 ? "m-hi" : r >= 15 ? "m-mid" : "m-lo";
const msg = t => { $("status-msg").textContent = t; };

/* ── boot ─────────────────────────────────────────────────────────────── */
async function boot() {
  const [graph, summary, issues] = await Promise.all([
    fetch("/api/graph").then(r => r.json()),
    fetch("/api/summary").then(r => r.json()),
    fetch("/api/issues").then(r => r.json()),
  ]);
  S.nodes = graph.nodes; S.edges = graph.edges;
  S.summary = summary; S.issues = issues.issues || [];
  for (const n of S.nodes) S.byId[n.id] = n;
  for (const e of S.edges) if (e.kind === "contains") {
    (S.children[e.src] ||= []).push(e.dst);
    S.parent[e.dst] = e.src;
  }
  for (const i of S.issues) (S.issuesByNode[i.node_id] ||= []).push(i);

  S.modules = S.nodes.filter(n => n.kind === "module")
    .map(m => {
      const kids = descendants(m.id);
      return { ...m, count: kids.length,
               maxRisk: Math.max(0, ...kids.map(k => k.risk || 0)),
               nIssues: kids.reduce((a, k) => a + (S.issuesByNode[k.id]?.length || 0), 0)
                        + (S.issuesByNode[m.id]?.length || 0) };
    })
    .sort((a, b) => a.file.localeCompare(b.file));

  $("repo-path").textContent = summary.repo_root || "";
  const sm = summary.summary || {};
  $("stats").innerHTML =
    `<b>${S.nodes.length}</b> nodes · <b>${S.edges.length}</b> edges · ` +
    `<b>${S.issues.length}</b> issues`;

  renderModules(); pickModule(0); renderIssues(); renderSummaryInspector();
  focusPane(1);
  msg("ready — press g for the graph map");
}

function descendants(id) {
  const out = []; const stack = [...(S.children[id] || [])];
  while (stack.length) {
    const cur = stack.pop(); const n = S.byId[cur];
    if (!n) continue;
    out.push(n); stack.push(...(S.children[cur] || []));
  }
  return out;
}
function moduleOf(id) {
  let cur = id;
  while (cur && S.byId[cur] && S.byId[cur].kind !== "module") cur = S.parent[cur];
  return cur;
}

/* ── modules pane ─────────────────────────────────────────────────────── */
function renderModules() {
  $("modules-list").innerHTML = S.modules.map((m, i) => `
    <button class="row ${i === S.modIdx ? "selected" : ""}" data-i="${i}"
            role="option" aria-selected="${i === S.modIdx}">
      <span class="grow k-module">${esc(m.qualname)}</span>
      <span class="num">${m.count}</span>
      ${m.nIssues ? `<span style="color:var(--red)">!${m.nIssues}</span>` : ""}
    </button>`).join("");
  $("modules-list").querySelectorAll(".row").forEach(el =>
    el.addEventListener("click", () => { pickModule(+el.dataset.i); focusPane(2); }));
}
function pickModule(i) {
  S.modIdx = Math.max(0, Math.min(i, S.modules.length - 1));
  S.query = ""; $("search").value = "";
  buildNodeRows(); S.nodeIdx = 0;
  renderModules(); renderNodes();
  const sel = $("modules-list").children[S.modIdx];
  if (sel) sel.scrollIntoView({ block: "nearest" });
}

/* ── nodes pane ───────────────────────────────────────────────────────── */
function buildNodeRows() {
  let rows;
  if (S.query) {
    const q = S.query.toLowerCase();
    rows = S.nodes.filter(n => n.kind !== "module" &&
      (n.name.toLowerCase().includes(q) || n.qualname.toLowerCase().includes(q)));
  } else {
    const mod = S.modules[S.modIdx];
    rows = mod ? descendants(mod.id) : [];
  }
  const key = S.sort;
  rows.sort((a, b) => key === "name" ? a.name.localeCompare(b.name)
                                     : (b[key] || 0) - (a[key] || 0));
  S.nodeRows = rows;
}
function renderNodes() {
  const maxBlast = Math.max(1, ...S.nodeRows.map(n => n.blast || 0));
  $("nodes-list").innerHTML = S.nodeRows.map((n, i) => `
    <button class="row ${i === S.nodeIdx ? "selected" : ""}" data-i="${i}"
            role="option" aria-selected="${i === S.nodeIdx}">
      <span class="k-${n.kind}" style="width:11ch">${KSHORT[n.kind] || n.kind}</span>
      <span class="grow">${esc(n.name)}</span>
      <span style="width:16ch">${meter(n.risk || 0, 100, 10, riskCls(n.risk || 0))} ${String(n.risk || 0).padStart(3)}</span>
      <span class="num" style="width:7ch">${n.blast || 0}</span>
      <span style="width:6ch;color:${S.issuesByNode[n.id] ? "var(--red)" : "var(--faint)"}">${S.issuesByNode[n.id]?.length || "·"}</span>
    </button>`).join("") ||
    `<p class="empty">no nodes${S.query ? " match /" + esc(S.query) : ""}</p>`;
  $("nodes-list").querySelectorAll(".row").forEach(el =>
    el.addEventListener("click", () => { pickNode(+el.dataset.i); focusPane(2); }));
}
function pickNode(i, scroll = true) {
  if (!S.nodeRows.length) return;
  S.nodeIdx = Math.max(0, Math.min(i, S.nodeRows.length - 1));
  renderNodes();
  if (scroll) {
    const sel = $("nodes-list").children[S.nodeIdx];
    if (sel && sel.scrollIntoView) sel.scrollIntoView({ block: "nearest" });
  }
  inspect(S.nodeRows[S.nodeIdx].id);
}

/* ── inspector ────────────────────────────────────────────────────────── */
function renderSummaryInspector() {
  const s = S.summary.summary || {};
  const scores = s.scores || {};
  const rows = Object.entries(scores).map(([k, v]) => {
    const cls = v >= 70 ? "m-lo" : v >= 40 ? "m-mid" : "m-hi";
    return `<div class="kv"><span class="k">${esc(k)}</span>
      <span>${meter(v, 100, 20, cls)} ${String(Math.round(v)).padStart(3)}</span></div>`;
  }).join("");
  const risky = (s.top_risky || []).slice(0, 8).map(r => `
    <button data-id="${esc(r.id)}"><span class="arrow">→</span>
      <span class="k-${r.kind}">${KSHORT[r.kind]}</span> ${esc(r.name)}
      <span class="num"> risk ${r.risk}</span></button>`).join("");
  $("inspector-body").innerHTML = `
    <h2>system</h2>
    <div class="file">${s.files_scanned ?? 0} files scanned · doc coverage ${s.doc_coverage ?? 0}%</div>
    <div class="sect">SCORES</div>${rows}
    <div class="sect">HOTTEST NODES</div><div class="deps">${risky || '<span class="empty">none</span>'}</div>`;
  $("inspector-body").querySelectorAll(".deps button").forEach(el =>
    el.addEventListener("click", () => jumpTo(el.dataset.id)));
}

async function inspect(id) {
  const n = await fetch("/api/node/" + encodeURIComponent(id)).then(r => r.json());
  const total = Math.max(1, (S.summary.summary?.nodes || 2) - 1);
  const deps = [
    ...n.out_edges.filter(e => e.kind !== "contains")
      .map(e => ({ ...e, dir: "→" })),
    ...n.in_edges.filter(e => e.kind !== "contains")
      .map(e => ({ ...e, dir: "←" })),
  ];
  const depRows = deps.map(e => `
    <button data-id="${esc(e.id)}"><span class="arrow">${e.dir} ${esc(e.kind)}</span>
      <span class="k-${e.node_kind}"> ${esc(e.name)}</span></button>`).join("");
  const issueRows = (n.issues || []).map(i => `
    <div class="issue-block ${esc(i.severity)}">
      <span class="sev">${esc(i.severity).toUpperCase()}</span> ${esc(i.title)}
      <p>${esc(i.detail)}</p>
    </div>`).join("");
  $("inspector-body").innerHTML = `
    <h2><span class="k-${n.kind}">${KSHORT[n.kind] || n.kind}</span> ${esc(n.name)}</h2>
    <div class="file">${esc(n.file)}:${n.line}</div>
    <div class="sect">METRICS</div>
    <div class="kv">
      <span class="k">blast radius</span>
      <span>${meter(n.blast, total, 20, riskCls(30 * n.blast / total))} ${n.blast} node${n.blast === 1 ? "" : "s"}</span>
      <span class="k">risk</span>
      <span>${meter(n.risk, 100, 20, riskCls(n.risk))} ${n.risk}</span>
      <span class="k">uses / used by</span><span>${n.uses} / ${n.used_by}</span>
      ${(n.meta?.signals || []).length ? `<span class="k">signals</span><span style="color:var(--yellow)">${n.meta.signals.map(esc).join(", ")}</span>` : ""}
      ${n.meta?.http_method ? `<span class="k">route</span><span>${esc(n.meta.http_method)} ${esc(n.meta.route || "")}</span>` : ""}
    </div>
    ${issueRows ? `<div class="sect">ISSUES</div>${issueRows}` : ""}
    <div class="sect">EDGES</div><div class="deps">${depRows || '<span class="empty">no call/import edges</span>'}</div>
    ${n.snippet ? `<div class="sect">SOURCE</div><pre class="code">${esc(n.snippet)}</pre>` : ""}`;
  $("inspector-body").querySelectorAll(".deps button").forEach(el =>
    el.addEventListener("click", () => jumpTo(el.dataset.id)));
  if (S.cy) highlightInMap(id);
}

function jumpTo(id) {
  const node = S.byId[id];
  if (!node) return;
  if (node.kind === "module") {
    const mi = S.modules.findIndex(m => m.id === id);
    if (mi >= 0) { pickModule(mi); focusPane(1); }
    inspect(id);
    return;
  }
  const mi = S.modules.findIndex(m => m.id === moduleOf(id));
  if (mi >= 0 && mi !== S.modIdx) pickModule(mi);
  const ni = S.nodeRows.findIndex(r => r.id === id);
  if (ni >= 0) pickNode(ni); else inspect(id);
  focusPane(2);
}

/* ── issues pane ──────────────────────────────────────────────────────── */
function renderIssues() {
  $("issues-list").innerHTML = S.issues.map((i, idx) => `
    <button class="row ${idx === S.issueIdx ? "selected" : ""}" data-i="${idx}" data-id="${esc(i.node_id || "")}">
      <span class="sev ${esc(i.severity)}">${esc(i.severity).toUpperCase()}</span>
      <span class="grow">${esc(i.title)}</span>
      <span class="loc">${esc(i.file)}:${i.line || "?"}</span>
    </button>`).join("") ||
    `<p class="empty">no agent findings — run: repograph scan &lt;repo&gt; --agents</p>`;
  $("issues-list").querySelectorAll(".row").forEach(el =>
    el.addEventListener("click", () => { S.issueIdx = +el.dataset.i; renderIssues();
      if (el.dataset.id) jumpTo(el.dataset.id); }));
}

/* ── graph map overlay ────────────────────────────────────────────────── */
function toggleMap(open) {
  S.mapOpen = open ?? !S.mapOpen;
  $("p-map").classList.toggle("open", S.mapOpen);
  if (S.mapOpen && !S.cy) initMap();
  if (S.mapOpen && S.nodeRows[S.nodeIdx]) highlightInMap(S.nodeRows[S.nodeIdx].id);
  msg(S.mapOpen ? "map open — esc to close" : "");
}
function initMap() {
  const maxBlast = Math.max(1, ...S.nodes.map(n => n.blast || 0));
  S.cy = cytoscape({
    container: $("cy"),
    elements: [
      ...S.nodes.map(n => ({ data: { id: n.id, label: n.name, kind: n.kind,
        size: 10 + 16 * ((n.blast || 0) / maxBlast) } })),
      ...S.edges.map((e, i) => ({ data: { id: "e" + i, source: e.src, target: e.dst, kind: e.kind } })),
    ],
    wheelSensitivity: 0.25,
    style: [
      { selector: "node", style: {
          shape: "rectangle",
          "background-color": el => KCOLOR[el.data("kind")] || "#928374",
          width: "data(size)", height: "data(size)",
          label: "data(label)", color: "#837E70",
          "font-family": "JetBrains Mono, monospace", "font-size": 8,
          "text-valign": "bottom", "text-margin-y": 3 } },
      { selector: "edge", style: {
          "curve-style": "haystack", "haystack-radius": 0.4,
          "line-color": el => el.data("kind") === "calls" ? "#4E4A3F" : "#2A281F",
          width: 1 } },
      { selector: ".hot", style: { "border-width": 2, "border-color": "#FFB000",
          color: "#FFB000", "z-index": 9 } },
      { selector: ".dim", style: { opacity: 0.15, label: "" } },
    ],
    layout: { name: "cose", animate: false, nodeRepulsion: 8000, padding: 20 },
  });
  S.cy.on("tap", "node", evt => { jumpTo(evt.target.id()); });
  S.cy.on("tap", evt => { if (evt.target === S.cy) {
    S.cy.elements().removeClass("dim hot"); } });
  $("map-legend").innerHTML = Object.entries(KCOLOR).map(([k, c]) =>
    `<span style="color:${c}">■</span> ${KSHORT[k]}`).join("  ");
}
function highlightInMap(id) {
  if (!S.cy) return;
  const node = S.cy.getElementById(id);
  if (!node.nonempty()) return;
  S.cy.elements().addClass("dim").removeClass("hot");
  node.closedNeighborhood().removeClass("dim");
  node.addClass("hot");
  if (S.mapOpen) S.cy.animate({ center: { eles: node } }, { duration: 150 });
}

/* ── keyboard ─────────────────────────────────────────────────────────── */
const PANES = { 1: "p-modules", 2: "p-nodes", 3: "p-inspector", 4: "p-issues" };
function focusPane(n) {
  S.pane = n;
  for (const [k, id] of Object.entries(PANES))
    $(id).classList.toggle("focused", +k === n);
}
function move(delta) {
  if (S.pane === 1) pickModule(S.modIdx + delta);
  else if (S.pane === 2) pickNode(S.nodeIdx + delta);
  else if (S.pane === 4 && S.issues.length) {
    S.issueIdx = Math.max(0, Math.min(S.issueIdx + delta, S.issues.length - 1));
    renderIssues();
    $("issues-list").children[S.issueIdx]?.scrollIntoView({ block: "nearest" });
  } else if (S.pane === 3) $("inspector-body").scrollBy(0, delta * 48);
}

document.addEventListener("keydown", e => {
  if (e.target === $("search")) {
    if (e.key === "Escape") { $("search").value = ""; S.query = ""; buildNodeRows();
      renderNodes(); $("search").blur(); focusPane(2); }
    if (e.key === "Enter") { $("search").blur(); focusPane(2); pickNode(0); }
    return;
  }
  if (e.key === "/") { e.preventDefault(); $("search").focus(); return; }
  if (e.key >= "1" && e.key <= "4") { focusPane(+e.key); return; }
  switch (e.key) {
    case "j": case "ArrowDown": e.preventDefault(); move(1); break;
    case "k": case "ArrowUp": e.preventDefault(); move(-1); break;
    case "Enter":
      if (S.pane === 1) { focusPane(2); pickNode(0); }
      else if (S.pane === 2) pickNode(S.nodeIdx);
      else if (S.pane === 4 && S.issues[S.issueIdx]?.node_id) jumpTo(S.issues[S.issueIdx].node_id);
      break;
    case "g": toggleMap(); break;
    case "Escape":
      if (S.mapOpen) toggleMap(false);
      else { renderSummaryInspector(); focusPane(1); }
      break;
    case "r": S.sort = "risk"; buildNodeRows(); S.nodeIdx = 0; renderNodes(); msg("sorted by risk"); break;
    case "b": S.sort = "blast"; buildNodeRows(); S.nodeIdx = 0; renderNodes(); msg("sorted by blast"); break;
    case "n": S.sort = "name"; buildNodeRows(); S.nodeIdx = 0; renderNodes(); msg("sorted by name"); break;
  }
});
$("search").addEventListener("input", e => {
  S.query = e.target.value.trim();
  buildNodeRows(); S.nodeIdx = 0; renderNodes();
});
[1, 2, 3, 4].forEach(n => $(PANES[n]).addEventListener("mousedown", () => focusPane(n)));

boot().catch(err => {
  $("inspector-body").innerHTML =
    `<p class="empty">could not load graph: ${esc(err.message)}<br>
     run: repograph scan &lt;repo&gt; — then restart the server</p>`;
  msg("error");
});
</script>
</body>
</html>
